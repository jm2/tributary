  preview_skipped: "Pozostałe pominięcia — Kolejki: %{queues} · Nieobsługiwane listy: %{unsupported} · Problemy źródła: %{parser_issues}"
  applying_heading: "Stosowanie migracji z Rhythmbox"
  applying_body: "Tributary atomowo stosuje sprawdzone zmiany. Nie zamykaj aplikacji; końcowy wynik pojawi się po zamknięciu żądania."
  completed_heading: "Migracja z Rhythmbox zakończona"
  completed_body: "Dopasowane utwory: %{matched}\nZaktualizowane oceny: %{ratings}\nZaktualizowane liczby odtworzeń: %{play_counts}\nZaktualizowane daty ostatniego odtworzenia: %{last_played}\nUtworzone listy: %{playlists}"
  completed_refresh_failed_body: "Migracja została zapisana, ale Tributary nie może odświeżyć bieżącego widoku biblioteki. Uruchom Tributary ponownie, aby wczytać zapisane zmiany."
  stale_heading: "Podgląd migracji jest nieaktualny"
  stale_body: "Lokalna biblioteka Tributary zmieniła się po utworzeniu podglądu. Nic nie zapisano. Zacznij ponownie, aby uzyskać aktualny podgląd."
  failed_heading: "Migracja z Rhythmbox nie powiodła się"
  failed_body: "Migracja nie została zapisana. Ten zamknięty komunikat pomija ścieżki źródłowe, nazwy list i wewnętrzne szczegóły błędu."
  ok_action: "OK"
  missing_document_heading: "Brak bazy Rhythmbox"
  missing_document_body: "Wybrany folder nie zawiera wymaganego pliku rhythmdb.xml. Migracja nie została rozpoczęta."
  documents_unavailable_heading: "Dokumenty Rhythmbox niedostępne"
  documents_unavailable_body: "Folder profilu musi być bezpośrednim katalogiem lokalnym, a dokumenty zwykłymi plikami. Powiązane foldery ani pliki podrzędne, w tym dowiązania symboliczne i punkty ponownej analizy Windows, nie są akceptowane."
  documents_too_large_heading: "Dokumenty Rhythmbox są za duże"
  documents_too_large_body: "Wybrany dokument profilu przekracza bezpieczny limit importu. Migracja nie została rozpoczęta."
  documents_changed_heading: "Dokumenty Rhythmbox uległy zmianie"
  documents_changed_body: "Profil zmienił się podczas odczytu. Nic nie zapisano; spróbuj ponownie, gdy Rhythmbox zakończy zapis."
  invalid_documents_heading: "Nieprawidłowe dokumenty Rhythmbox"
  invalid_documents_body: "Wybrane pliki nie są obsługiwanymi dokumentami XML Rhythmbox albo przekraczają strukturalne limity bezpieczeństwa. Migracja nie została rozpoczęta."
  database_unavailable_heading: "Biblioteka Tributary niedostępna"
  database_unavailable_body: "Tributary nie może otworzyć lokalnej biblioteki w trybie tylko do odczytu, aby utworzyć podgląd. Migracja nie została rozpoczęta."
  preview_failed_heading: "Nie można przygotować migracji"
  preview_failed_body: "Tributary nie może utworzyć bezpiecznego planu migracji. Nie wprowadzono zmian, a prywatne dane źródła pominięto."
