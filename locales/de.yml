  completed_refresh_failed_body: "Die Migration wurde gespeichert, aber Tributary konnte die aktuelle Bibliotheksansicht nicht aktualisieren. Starten Sie Tributary neu, um die gespeicherten Änderungen zu laden."
  stale_heading: "Migrationsvorschau ist nicht mehr aktuell"
  stale_body: "Die lokale Tributary-Bibliothek wurde nach der Vorschau geändert. Es wurde nichts gespeichert. Beginnen Sie erneut, um eine aktuelle Vorschau zu erstellen."
  failed_heading: "Rhythmbox-Migration fehlgeschlagen"
