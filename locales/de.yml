  missing_document_body: "Der ausgewählte Ordner enthält nicht die erforderliche Datei rhythmdb.xml. Es wurde keine Migration gestartet."
  documents_unavailable_heading: "Rhythmbox-Dokumente nicht verfügbar"
  documents_unavailable_body: "Der Profilordner muss ein direktes lokales Verzeichnis und seine Dokumente müssen reguläre Dateien sein. Verknüpfte Ordner oder untergeordnete Dateien, einschließlich symbolischer Links und Windows-Analysepunkte, werden nicht akzeptiert."
  documents_too_large_heading: "Rhythmbox-Dokumente zu groß"
  documents_too_large_body: "Ein ausgewähltes Profildokument überschreitet die sichere Importgrenze. Es wurde keine Migration gestartet."
  documents_changed_heading: "Rhythmbox-Dokumente wurden geändert"
  documents_changed_body: "Das Profil wurde geändert, während Tributary es gelesen hat. Es wurde nichts gespeichert; versuchen Sie es erneut, nachdem Rhythmbox den Schreibvorgang beendet hat."
  invalid_documents_heading: "Ungültige Rhythmbox-Dokumente"
  invalid_documents_body: "Die ausgewählten Dateien sind keine unterstützten Rhythmbox-XML-Dokumente oder überschreiten strukturelle Sicherheitsgrenzen. Es wurde keine Migration gestartet."
  database_unavailable_heading: "Tributary-Bibliothek nicht verfügbar"
  database_unavailable_body: "Tributary konnte seine lokale Bibliothek nicht schreibgeschützt für eine Vorschau öffnen. Es wurde keine Migration gestartet."
  preview_failed_heading: "Migration konnte nicht vorbereitet werden"
  preview_failed_body: "Tributary konnte keinen sicheren Migrationsplan erstellen. Es wurden keine Änderungen vorgenommen und private Quelldetails wurden ausgelassen."
  worker_failed_heading: "Migrationsvorschau wurde beendet"
  worker_failed_body: "Der Vorschauprozess wurde beendet, ohne einen Plan zurückzugeben. Es wurden keine Änderungen vorgenommen und private Quelldetails wurden ausgelassen."
