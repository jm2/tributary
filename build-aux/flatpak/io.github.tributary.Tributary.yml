app-id: io.github.tributary.Tributary
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: tributary
finish-args:
  # Wayland + X11 fallback
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Audio output
  - --socket=pulseaudio
  # Network (for remote backends: Subsonic, Jellyfin, DAAP)
  - --share=network
  # The standard Music folder is the only library exposed read/write without
  # an explicit chooser grant. GtkFileDialog uses the FileChooser/Documents
  # portals to grant persistent access to any other user-selected folder.
  - --filesystem=xdg-music:rw
  # Flatpak documents these as the conventional external-drive mount roots.
  # Automatic device browsing needs only native-path reads; a user who wants
  # tag editing can add a writable folder explicitly through GtkFileDialog.
  - --filesystem=/media:ro
  - --filesystem=/run/media:ro
  - --filesystem=/mnt:ro
  # GIO VolumeMonitor reaches the host GVfs daemons through this service
  # namespace, whose methods are broader than mount listing alone. Tributary
  # consumes only cached native mount metadata; xdg-run/gvfs{,d} grants are
  # intentionally omitted, and file access uses the mounts above.
  - --talk-name=org.gtk.vfs.*
  # Last.fm session keys use the desktop Secret Service. If this reviewed
  # service is absent, locked, or denied, Tributary fails closed rather than
  # falling back to its plaintext settings or SQLite database.
  - --talk-name=org.freedesktop.secrets
  # D-Bus ownership for MPRIS media keys
  - --own-name=org.mpris.MediaPlayer2.tributary
  # System theme / icon access
  - --filesystem=xdg-data/themes:ro
  - --filesystem=xdg-data/icons:ro

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/tributary/cargo
    CARGO_NET_OFFLINE: "true"

modules:
  - name: tributary
    buildsystem: simple
    build-commands:
      - cargo build --offline --release
      - install -Dm0755 target/release/tributary /app/bin/tributary
      - install -Dm0644 data/io.github.tributary.Tributary.desktop
          /app/share/applications/io.github.tributary.Tributary.desktop
      - install -Dm0644 data/io.github.tributary.Tributary.metainfo.xml
          /app/share/metainfo/io.github.tributary.Tributary.metainfo.xml
      - for size in 16 24 32 48 64 128 256 512; do
          install -Dm0644
            "data/icons/hicolor/${size}x${size}/apps/io.github.tributary.Tributary.png"
            "/app/share/icons/hicolor/${size}x${size}/apps/io.github.tributary.Tributary.png";
        done
    sources:
      - type: dir
        path: ../..
        # Directory sources copy the working tree, not just tracked files.
        # Exclude VCS/agent state and every known generated tree so a local
        # host target directory cannot enter or influence the sandbox build.
        skip:
          - .git
          - .agents
          - .claude
          - .codex
          - .flatpak-builder
          - .venv-flatpak
          - build-dir
          - cargo-sources.json
          - coverage
          - dist
          - fuzz/artifacts
          - fuzz/corpus
          - fuzz/target
          - manifests
          - repo
          - target
          - tributary.flatpak
          - build-aux/flatpak/cargo-sources.json
      - cargo-sources.json
