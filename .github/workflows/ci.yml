name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Security audit ─────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        run: cargo audit

  # ── MSRV (minimum supported Rust version) ─────────────────────────────────
  # Compile-proof for the `rust-version` declared in Cargo.toml. Keep the
  # toolchain pin below in lockstep with that field: the gtk-rs 0.11 release
  # series sets the current floor (rustc 1.92).
  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
    steps:
      - name: Install system dependencies (Fedora)
        run: |
          dnf install -y gcc gtk4-devel libadwaita-devel \
            dbus-devel \
            gstreamer1-devel gstreamer1-plugins-base-devel \
            pkgconf-pkg-config git curl

      - uses: actions/checkout@v7

      - name: Install Rust toolchain (1.92)
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: msrv-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: msrv-cargo-

      - name: Check (MSRV, --all-targets, --locked)
        run: cargo check --all-targets --locked

  # ── Desktop metadata (AppStream + desktop entry) ──────────────────────────
  # The packaging half of the global validation gate: these files ship in
  # every Linux package and were previously only validated by hand.
  desktop-metadata:
    name: Desktop Metadata
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install validators
        run: sudo apt-get update && sudo apt-get install -y appstream desktop-file-utils

      - name: Validate desktop entry
        run: |
          if ! diagnostics="$(desktop-file-validate data/io.github.tributary.Tributary.desktop 2>&1)"; then
            printf '%s\n' "$diagnostics"
            exit 1
          fi
          if [ -n "$diagnostics" ]; then
            printf '%s\n' "$diagnostics"
            exit 1
          fi

      - name: Validate AppStream metainfo
        run: appstreamcli validate --no-net data/io.github.tributary.Tributary.metainfo.xml

  # ── Linux (native binary + test) ──────────────────────────────────────────
  build-linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:41
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install system dependencies (Fedora)
        run: |
          dnf install -y gcc gcc-c++ gtk4-devel libadwaita-devel \
            dbus-devel \
            gstreamer1-devel gstreamer1-plugins-base-devel \
            gstreamer1-plugins-good gstreamer1-plugins-bad-free gstreamer1-plugins-ugly-free gstreamer1-libav \
            pkgconf-pkg-config git curl

      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-${{ matrix.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: linux-${{ matrix.arch }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (debug, --all-targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (release)
        run: cargo clippy --release -- -D warnings

      - name: Build (release)
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      # Debug-profile tests catch what release-only testing ships past:
      # debug_assert! bodies and overflow checks are compiled out above.
      - name: Run tests (debug, --all-targets)
        if: matrix.arch == 'x86_64'
        run: cargo test --all-targets

      # The fuzz crate is its own workspace, so the main fmt/clippy passes
      # never see it and its lockfile can drift (a drifted kstring once
      # raised its effective MSRV past the toolchain unnoticed). --locked
      # pins the committed resolution.
      - name: Fuzz workspace fmt + clippy
        if: matrix.arch == 'x86_64'
        env:
          CARGO_TARGET_DIR: target
        run: |
          cargo fmt --manifest-path fuzz/Cargo.toml --package tributary-fuzz -- --check
          cargo clippy --manifest-path fuzz/Cargo.toml --package tributary-fuzz --all-targets --locked -- -D warnings

      - name: Upload Linux binary
        uses: actions/upload-artifact@v7
        with:
          name: tributary-linux-${{ matrix.arch }}
          path: target/release/tributary
          if-no-files-found: error

  # ── Representative line coverage + ratchet (Linux x86_64) ────────────────
  # This is deliberately a separate, exactly pinned aggregate. Native jobs
  # remain responsible for compiling and testing platform-only code, but they
  # cannot produce one comparable cross-platform percentage.
  coverage:
    name: Coverage (Linux x86_64)
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
    steps:
      - name: Install system dependencies (Fedora)
        run: |
          dnf install -y gcc gcc-c++ gtk4-devel libadwaita-devel \
            dbus-devel \
            gstreamer1-devel gstreamer1-plugins-base-devel \
            gstreamer1-plugins-good gstreamer1-plugins-bad-free gstreamer1-plugins-ugly-free gstreamer1-libav \
            pkgconf-pkg-config git curl

      - uses: actions/checkout@v7

      - name: Install pinned coverage toolchain
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: llvm-tools-preview

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: coverage-1.92.0-llvm-cov-0.8.7-${{ hashFiles('Cargo.lock') }}
          restore-keys: coverage-1.92.0-llvm-cov-0.8.7-

      - name: Install pinned cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked

      - name: Run comprehensive coverage gate
        run: |
          minimum="$(tr -d '[:space:]' < coverage-baseline.txt)"
          cargo llvm-cov clean --workspace
          coverage_status=0
          cargo llvm-cov --all-targets --all-features --locked --html --output-dir coverage --fail-under-lines "$minimum" || coverage_status=$?
          cargo llvm-cov report --summary-only
          exit "$coverage_status"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-linux-x86_64
          path: coverage/
          if-no-files-found: error

  # ── macOS (.app + .dmg) ───────────────────────────────────────────────────
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: macos-15
            rust_target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies (Homebrew)
        run: |
          brew update
          brew install gtk4 libadwaita pkg-config create-dmg \
            gstreamer gst-plugins-good gst-plugins-bad gst-plugins-ugly gst-libav \
            adwaita-icon-theme

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: macos-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-${{ matrix.arch }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (debug, --all-targets)
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="${BREW_PREFIX}/lib/pkgconfig"
          cargo clippy --all-targets --target ${{ matrix.rust_target }} -- -D warnings

      - name: Clippy (release)
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="${BREW_PREFIX}/lib/pkgconfig"
          cargo clippy --release --target ${{ matrix.rust_target }} -- -D warnings

      - name: Build (release)
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="${BREW_PREFIX}/lib/pkgconfig"
          cargo build --release --target ${{ matrix.rust_target }}

      - name: Run tests
        run: |
          BREW_PREFIX="$(brew --prefix)"
          export PKG_CONFIG_PATH="${BREW_PREFIX}/lib/pkgconfig"
          cargo test --release --target ${{ matrix.rust_target }}

      - name: Create .app bundle and .dmg
        run: |
          # Copy the target-specific binary to the default location expected by build-macos.sh
          mkdir -p target/release
          cp target/${{ matrix.rust_target }}/release/tributary target/release/tributary
          bash scripts/build-macos.sh --dmg

      - name: Upload .dmg
        uses: actions/upload-artifact@v7
        with:
          name: tributary-macos-${{ matrix.arch }}
          path: dist/Tributary.dmg
          if-no-files-found: error

  # ── Windows (.zip DLL bundle) ─────────────────────────────────────────────
  build-windows:
    name: Windows (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Cap the job so a hung MSYS2 mirror fails fast and re-runs instead of
    # stalling to the 6-hour ceiling (as one CLANGARM64 run did).
    timeout-minutes: 45
    strategy:
      # Preserve the independent result from each architecture when a runner,
      # package mirror, or platform-specific test fails on the other one.
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-2025
            msystem: CLANG64
            pkg_prefix: mingw-w64-clang-x86_64
            rust_target: x86_64-pc-windows-gnullvm
            msys_env: clang64
          - arch: aarch64
            runner: windows-11-arm
            msystem: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
            rust_target: aarch64-pc-windows-gnullvm
            msys_env: clangarm64
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7

      - name: Set up MSYS2 (${{ matrix.msystem }})
        uses: msys2/setup-msys2@v2.32.0
        env:
          # Pin pacman to the canonical Cloudflare CDN (repo.msys2.org) instead of
          # the flaky secondary mirrors (ftp2.osuosl.org, mirror.msys2.org) that
          # stall on the slow windows-11-arm runner and trip pacman's "Operation
          # too slow" abort, failing the whole transaction. setup-msys2 #571/#577.
          __SETUP_MSYS2_USE_MAIN_MIRROR_ONLY: 'true'
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          update: true
          # setup-msys2's optional package-cache cleanup intermittently fails
          # at its paccache step on windows-11-arm after installation succeeds.
          # Cargo keeps its separate cache below; only skip the flaky MSYS2
          # package cache on that runner.
          cache: ${{ matrix.arch != 'aarch64' }}
          install: >-
            ${{ matrix.pkg_prefix }}-gtk4
            ${{ matrix.pkg_prefix }}-libadwaita
            ${{ matrix.pkg_prefix }}-gstreamer
            ${{ matrix.pkg_prefix }}-gst-plugins-good
            ${{ matrix.pkg_prefix }}-gst-plugins-bad
            ${{ matrix.pkg_prefix }}-gst-plugins-ugly
            ${{ matrix.pkg_prefix }}-gst-libav
            ${{ matrix.pkg_prefix }}-pkg-config
            ${{ matrix.pkg_prefix }}-toolchain

      - name: Install Rust (${{ matrix.rust_target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: windows-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-${{ matrix.arch }}-cargo-

      # Run fmt unconditionally — it's sub-second and fails fast, so a
      # fmt-broken commit short-circuits the slow ARM64 runner before
      # any compile work happens.
      - name: Check formatting
        run: cargo fmt --check

      # Heavier strict-lint passes only on x86_64 — the windows-11-arm
      # runner is materially slower than the rest, so we skip the extra
      # clippy passes and the cargo-test step there. ARM64 still gets a
      # build to confirm cross-compile health and produces a release
      # artifact.
      - name: Clippy (debug, --all-targets)
        if: matrix.arch == 'x86_64'
        run: |
          export PKG_CONFIG_ALLOW_CROSS="1"
          export PKG_CONFIG_PATH="/${{ matrix.msys_env }}/lib/pkgconfig"
          cargo clippy --all-targets --target ${{ matrix.rust_target }} -- -D warnings

      - name: Clippy (release)
        if: matrix.arch == 'x86_64'
        run: |
          export PKG_CONFIG_ALLOW_CROSS="1"
          export PKG_CONFIG_PATH="/${{ matrix.msys_env }}/lib/pkgconfig"
          cargo clippy --release --target ${{ matrix.rust_target }} -- -D warnings

      - name: Clippy (release, ARM64-only fast path)
        if: matrix.arch == 'aarch64'
        run: |
          export PKG_CONFIG_ALLOW_CROSS="1"
          export PKG_CONFIG_PATH="/${{ matrix.msys_env }}/lib/pkgconfig"
          cargo clippy --release --target ${{ matrix.rust_target }} -- -D warnings

      - name: Build (release)
        run: |
          export PKG_CONFIG_ALLOW_CROSS="1"
          export PKG_CONFIG_PATH="/${{ matrix.msys_env }}/lib/pkgconfig"
          cargo build --release --target ${{ matrix.rust_target }}

      - name: Run tests
        if: matrix.arch == 'x86_64'
        run: |
          export PKG_CONFIG_ALLOW_CROSS="1"
          export PKG_CONFIG_PATH="/${{ matrix.msys_env }}/lib/pkgconfig"
          cargo test --release --target ${{ matrix.rust_target }}

      - name: Bundle DLLs and create zip
        run: |
          MSYS_ROOT=$(cygpath -w /)
          pwsh -File scripts/build-windows.ps1 -Msys2Root "$MSYS_ROOT" -NoCargoBuild
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          MSYS_ENV: ${{ matrix.msys_env }}

      - name: Upload Windows zip
        uses: actions/upload-artifact@v7
        with:
          name: tributary-windows-${{ matrix.arch }}
          path: dist/tributary-windows.zip
          if-no-files-found: error

  # ── Flatpak ───────────────────────────────────────────────────────────────
  build-flatpak:
    name: Flatpak (Linux)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Test Flatpak permission policy
        run: build-aux/flatpak/test-permissions.sh

      - name: Install Python dependencies
        run: |
          python3 -m pip install --requirement build-aux/flatpak/generator-requirements.txt \
            --break-system-packages \
            || python3 -m pip install --requirement build-aux/flatpak/generator-requirements.txt

      - name: Generate cargo-sources.json
        run: bash build-aux/flatpak/generate-cargo-sources.sh

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: tributary.flatpak
          manifest-path: build-aux/flatpak/io.github.tributary.Tributary.yml
          cache-key: flatpak-${{ hashFiles('**/Cargo.lock') }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v7
        with:
          name: tributary-flatpak
          path: tributary.flatpak
          if-no-files-found: error

  # ── SHA256 Checksums ───────────────────────────────────────────────────────
  checksums:
    name: SHA256 Checksums
    runs-on: ubuntu-24.04
    needs: [build-linux, build-macos, build-windows, build-flatpak]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.flatpak' -o -name 'tributary' \) \
            -exec sha256sum {} + | sed 's|  \./|  |' | sort -k2 > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Upload SHA256SUMS
        uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS
          path: SHA256SUMS.txt
          if-no-files-found: warn
