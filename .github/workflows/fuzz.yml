name: Fuzz
on:
  schedule:
    # Run weekly on Sunday at 04:00 UTC.
    - cron: '0 4 * * 0'
  workflow_dispatch:
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
jobs:
  fuzz:
    name: Fuzz Targets
    runs-on: ubuntu-24.04
    # The fuzz crate depends on the full `tributary` library, so this builds
    # and ASAN-instruments the entire dependency tree (GTK4, GStreamer,
    # SeaORM, aws-lc-sys, ...) with codegen-units=1 from a cold cache before
    # the 5-minute fuzz run. Allow generous headroom for that compile.
    timeout-minutes: 60
    container:
      image: fedora:44
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y gcc gcc-c++ gtk4-devel libadwaita-devel \
            dbus-devel \
            gstreamer1-devel gstreamer1-plugins-base-devel \
            pkgconf-pkg-config git curl
      - uses: actions/checkout@v7
      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: fuzz-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: fuzz-cargo-
      - name: Cache fuzz corpus
        uses: actions/cache@v6
        with:
          path: fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      - name: Install Rust nightly (required for cargo-fuzz)
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Fuzz DMAP parser (5 minutes)
        run: cargo fuzz run fuzz_dmap -- -max_total_time=300
      - name: Upload crash artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
          if-no-files-found: ignore
