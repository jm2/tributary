name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build (for example, v0.5.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FLATPAK_CARGO_GENERATOR_COMMIT: 737c0085912f9f7dabf9341d4608e2a77a51a73a
  FLATPAK_CARGO_GENERATOR_SHA256: b373c8ab1a05378ec5d8ed0645c7b127bcec7d2f7a1798694fbc627d570d856c

jobs:
  # Resolve the event tag once, validate it against the tagged source, and
  # expose an immutable commit SHA to every build job.
  prepare:
    name: Resolve release source
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      build_ref: ${{ steps.source.outputs.build_ref }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.source.outputs.version }}
    steps:
      - name: Validate requested tag
        id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG="${RELEASE_TAG}"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${DISPATCH_TAG}"
          else
            echo "Unsupported release event: ${GITHUB_EVENT_NAME}" >&2
            exit 1
          fi

          SEMVER_TAG='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$'
          if [[ ! "${TAG}" =~ ${SEMVER_TAG} ]]; then
            echo "Release tag must be a v-prefixed semantic version; got '${TAG}'" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v7
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve immutable source and version
        id: source
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          BUILD_REF="$(git rev-parse HEAD)"
          VERSION="$(awk -F'"' '/^\[package\]/{in_package=1; next} in_package && /^version = /{print $2; exit}' Cargo.toml)"
          if [[ -z "${VERSION}" ]]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi
          if [[ "${TAG}" != "v${VERSION}" ]]; then
            echo "Tag ${TAG} does not match Cargo.toml version ${VERSION}" >&2
            exit 1
          fi
          echo "build_ref=${BUILD_REF}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

  # ── Linux Flatpak (x86_64 + aarch64) ─────────────────────────────────────
  flatpak:
    name: Flatpak (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          persist-credentials: false

      # Install Flatpak natively on the runner instead of using an x86_64 container.
      - name: Install Flatpak & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils python3-pip

          # Fix Polkit permission errors for headless bare-metal Flatpak
          sudo mkdir -p /etc/polkit-1/rules.d
          sudo tee /etc/polkit-1/rules.d/99-flatpak.rules << 'EOF'
          polkit.addRule(function(action, subject) {
              if (action.id.startsWith("org.freedesktop.Flatpak.") && subject.user === "runner") {
                  return polkit.Result.YES;
              }
          });
          EOF

          # Add the Flathub repository
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Python dependencies
        run: |
          pip3 install --requirement build-aux/flatpak/generator-requirements.txt \
            --break-system-packages \
            || pip3 install --requirement build-aux/flatpak/generator-requirements.txt

      - name: Download flatpak-cargo-generator
        run: |
          mkdir -p build-aux/flatpak
          curl --fail --show-error --silent --location \
            --proto '=https' --tlsv1.2 \
            --output build-aux/flatpak/flatpak-cargo-generator.py \
            "https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/${FLATPAK_CARGO_GENERATOR_COMMIT}/cargo/flatpak-cargo-generator.py"
          echo "${FLATPAK_CARGO_GENERATOR_SHA256}  build-aux/flatpak/flatpak-cargo-generator.py" \
            | sha256sum --check --strict

      - name: Generate cargo-sources.json
        run: |
          python3 build-aux/flatpak/flatpak-cargo-generator.py \
            Cargo.lock -o build-aux/flatpak/cargo-sources.json

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: tributary-linux-${{ matrix.arch }}.flatpak
          manifest-path: build-aux/flatpak/io.github.tributary.Tributary.yml
          cache-key: flatpak-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          arch: ${{ matrix.arch }}

      - name: Upload Flatpak as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: tributary-linux-${{ matrix.arch }}-flatpak
          path: tributary-linux-${{ matrix.arch }}.flatpak

  # ── macOS (.dmg) ──────────────────────────────────────────────────────────
  macos:
    name: macOS (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: macos-15
            rust_target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          persist-credentials: false

      - name: Install system dependencies (Homebrew)
        run: |
          brew update
          brew install gtk4 libadwaita pkg-config create-dmg \
            gstreamer gst-plugins-good gst-plugins-bad gst-plugins-ugly gst-libav \
            adwaita-icon-theme

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: release-macos-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-macos-${{ matrix.arch }}-cargo-

      - name: Build and create .dmg
        run: bash scripts/build-macos.sh --dmg

      - name: Rename DMG for release
        run: mv dist/Tributary.dmg dist/tributary-macos-${{ matrix.arch }}.dmg

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: tributary-macos-${{ matrix.arch }}-dmg
          path: dist/tributary-macos-${{ matrix.arch }}.dmg

  # ── Windows (.zip + Inno Setup .exe) ──────────────────────────────────────
  windows:
    name: Windows (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    # Cap the job so a hung MSYS2 mirror fails fast and re-runs instead of
    # stalling to the 6-hour ceiling.
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: windows-2025
            msystem: CLANG64
            pkg_prefix: mingw-w64-clang-x86_64
            rust_target: x86_64-pc-windows-gnullvm
            msys_env: clang64
            inno_arch: x64
          - arch: aarch64
            runner: windows-11-arm
            msystem: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
            rust_target: aarch64-pc-windows-gnullvm
            msys_env: clangarm64
            inno_arch: arm64
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          persist-credentials: false

      - name: Set up MSYS2 (${{ matrix.msystem }})
        uses: msys2/setup-msys2@v2.32.0
        env:
          # Pin pacman to the canonical Cloudflare CDN (repo.msys2.org) instead of
          # the flaky secondary mirrors (ftp2.osuosl.org, mirror.msys2.org) that
          # stall on the slow windows-11-arm runner and trip pacman's "Operation
          # too slow" abort, failing the whole transaction. setup-msys2 #571/#577.
          __SETUP_MSYS2_USE_MAIN_MIRROR_ONLY: 'true'
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          update: true
          install: >-
            ${{ matrix.pkg_prefix }}-gtk4
            ${{ matrix.pkg_prefix }}-libadwaita
            ${{ matrix.pkg_prefix }}-gstreamer
            ${{ matrix.pkg_prefix }}-gst-plugins-good
            ${{ matrix.pkg_prefix }}-gst-plugins-bad
            ${{ matrix.pkg_prefix }}-gst-plugins-ugly
            ${{ matrix.pkg_prefix }}-gst-libav
            ${{ matrix.pkg_prefix }}-pkg-config
            ${{ matrix.pkg_prefix }}-toolchain

      - name: Install Rust (${{ matrix.rust_target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: release-windows-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-windows-${{ matrix.arch }}-cargo-

      - name: Build (release)
        run: |
          export PKG_CONFIG_ALLOW_CROSS="1"
          export PKG_CONFIG_PATH="/${{ matrix.msys_env }}/lib/pkgconfig"
          cargo build --release --target ${{ matrix.rust_target }}

      - name: Bundle DLLs and create zip
        run: |
          MSYS_ROOT=$(cygpath -w /)
          pwsh -File scripts/build-windows.ps1 -Msys2Root "$MSYS_ROOT" -NoCargoBuild
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          MSYS_ENV: ${{ matrix.msys_env }}

      - name: Rename zip for release
        shell: pwsh
        run: |
          Move-Item dist/tributary-windows.zip dist/tributary-windows-${{ matrix.arch }}.zip

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Resolve MSYS2 root for Inno Setup
        id: msys2-root
        shell: msys2 {0}
        run: |
          echo "path=$(cygpath -w /)" >> "$GITHUB_OUTPUT"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          scripts/build-windows.ps1 -Msys2Root "${{ steps.msys2-root.outputs.path }}" -NoCargoBuild -SkipBundle -InnoSetup
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          MSYS_ENV: ${{ matrix.msys_env }}
          INNO_ARCH: ${{ matrix.inno_arch }}

      - name: Rename installer for release
        shell: pwsh
        run: |
          Move-Item dist/tributary-setup.exe dist/tributary-windows-${{ matrix.arch }}-setup.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tributary-windows-${{ matrix.arch }}
          path: |
            dist/tributary-windows-${{ matrix.arch }}.zip
            dist/tributary-windows-${{ matrix.arch }}-setup.exe

  # ── Linux Native Installers (deb, rpm, arch pkg) ─────────────────────────
  linux-deb:
    name: Debian Package (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    container:
      image: debian:sid
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            deb_arch: amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y build-essential curl git pkg-config \
            libgtk-4-dev libadwaita-1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libdbus-1-dev

      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: release-deb-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-deb-${{ matrix.arch }}-cargo-

      - name: Build .deb package
        run: cargo deb -o target/debian/tributary-${{ matrix.deb_arch }}.deb

      - name: Upload .deb as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: tributary-${{ matrix.deb_arch }}-deb
          path: target/debian/tributary-${{ matrix.deb_arch }}.deb

  linux-rpm:
    name: RPM Package (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    container:
      image: fedora:41
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            rpm_arch: x86_64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            rpm_arch: aarch64
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y gcc gtk4-devel libadwaita-devel \
            dbus-devel \
            gstreamer1-devel gstreamer1-plugins-base-devel \
            pkgconf-pkg-config git curl

      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: release-rpm-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-rpm-${{ matrix.arch }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Generate .rpm package
        run: cargo generate-rpm

      - name: Rename .rpm for release
        run: |
          RPM_FILE=$(ls target/generate-rpm/*.rpm | head -1)
          mv "$RPM_FILE" "target/generate-rpm/tributary-${{ matrix.rpm_arch }}.rpm"

      - name: Upload .rpm as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: tributary-${{ matrix.rpm_arch }}-rpm
          path: target/generate-rpm/tributary-${{ matrix.rpm_arch }}.rpm

  linux-arch:
    name: Arch Linux Package (x86_64)
    needs: prepare
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    container:
      image: archlinux:base-devel
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm git gtk4 libadwaita gstreamer sqlite \
            gst-plugins-good gst-plugins-bad gst-plugins-ugly gst-libav dbus rust

      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          persist-credentials: false

      - name: Cache Cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: release-arch-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-arch-x86_64-cargo-

      - name: Build Arch package
        run: |
          # makepkg refuses to run as root, so create a build user.
          useradd -m builder
          cp -r . /home/builder/tributary
          chown -R builder:builder /home/builder/tributary
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          # Copy PKGBUILD and build
          cd /home/builder/tributary
          cp build-aux/arch/PKGBUILD .
          # Set the version from the validated, checked-out release source.
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD

          su builder -c "BUILDDIR=/tmp/makepkg makepkg -sf --noconfirm --skipchecksums"

      - name: Collect package
        run: |
          PKG_FILE=$(ls /home/builder/tributary/*.pkg.tar.zst | head -1)
          mkdir -p dist
          cp "$PKG_FILE" dist/tributary-x86_64.pkg.tar.zst

      - name: Upload Arch package as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: tributary-x86_64-arch
          path: dist/tributary-x86_64.pkg.tar.zst

  # ── SHA256 Checksums ───────────────────────────────────────────────────────
  checksums:
    name: SHA256 Checksums
    runs-on: ubuntu-24.04
    needs: [flatpak, macos, windows, linux-deb, linux-rpm, linux-arch]
    permissions:
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.flatpak' \
            -o -name '*.deb' -o -name '*.rpm' -o -name '*.pkg.tar.zst' \
            -o -name '*-setup.exe' \) \
            -exec sha256sum {} + | sed 's|  .*/|  |' | sort -k2 > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Upload SHA256SUMS as artifact
        uses: actions/upload-artifact@v7
        with:
          name: SHA256SUMS
          path: SHA256SUMS.txt
          if-no-files-found: error

  # The only job with a repository write token. It checks out no project or
  # build code and uses immutable action revisions only to transfer completed
  # artifacts to the already-created GitHub release.
  publish:
    name: Publish release assets
    if: github.event_name == 'release'
    needs: [prepare, checksums]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download verified build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish assets to the validated release tag
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*.flatpak
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*-setup.exe
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/*.pkg.tar.zst
            release-assets/SHA256SUMS.txt
